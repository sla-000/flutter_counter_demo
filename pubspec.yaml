name: flutter_counter_shooter
description: Typical flutter counter demo project with an ability to shoot
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.14.0 <3.0.0"

dependencies:
  flutter_bloc: ^7.3.0
  freezed_annotation: ^0.14.3
  flutter:
    sdk: flutter
  get_it: ^7.2.0
  meta: ^1.7.0
  rxdart: ^0.27.0

dev_dependencies:
  build_runner: ^2.1.4
  freezed: 0.14.5
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf
